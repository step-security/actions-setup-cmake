name: Action Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  action_tests:
    runs-on: ${{ matrix.os }}
    name: Action Test
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest", "macos-latest", "ubuntu-24.04-arm"]') }}
        cmake_ver: ${{ github.actor == 'dependabot[bot]' && fromJSON('[""]') || fromJSON('["", "3.19.3", "3.15.1", "2.8"]') }}
        exclude:
        - os: ubuntu-24.04-arm
          cmake_ver: '3.15.1'
        - os: ubuntu-24.04-arm
          cmake_ver: '2.8'

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup cmake
      uses: ./
      id: setup
      with:
        cmake-version: ${{ matrix.cmake_ver }}

    - name: Run cmake --version
      shell: bash
      if: matrix.cmake_ver != ''
      run: |
        VERSION=`cmake --version`
        echo $VERSION
        [[ "$VERSION" =~ "${{ matrix.cmake_ver }}" ]]

    - name: Run cmake --version
      # [[ "$VERSION" =~ "" ]] does not work as expected on macos, so don't
      # do the test when using the latest cmake version
      shell: bash
      if: matrix.cmake_ver == ''
      run: |
        VERSION=`cmake --version`
        echo $VERSION

  unit_tests:
    runs-on: ${{ matrix.os }}
    name: Unit Test
    strategy:
      matrix:
        os: ${{ github.actor == 'dependabot[bot]' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') }}

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Setup node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '24.x'

    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install node dependencies
      run: npm install

    - name: Check `npm run format` has been run
      run: |
        npm run format
        git diff --quiet src/ __tests__/

    - name: Check `npm run package` has been run
      run: |
        npm run package
        git diff --quiet dist/

    - name: Run tests
      run: npm test
